<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💰 Cost & Income Prediction | Vithai360</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.container {
    width: 650px;
    margin: 30px auto;
    background-color: #2e7d32;
    padding: 25px;
    border-radius: 10px;
    color: white;
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

input {
    width: 100%;
    padding: 8px;
    margin: 6px 0 12px 0;
}

button {
    background-color: #1b5e20;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 10px;
}

.result {
    background-color: #e8f5e9;
    color: black;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
<h2>💰 Farming Cost & Income Prediction</h2>

<label>🌾 Crop</label>
<input type="text" id="crop" placeholder="Rice, Tomato">

<label>📐 Land Area (acres)</label>
<input type="number" id="area">

<label>🌱 Seed Cost (₹)</label>
<input type="number" id="seed">

<label>💧 Irrigation Cost (₹)</label>
<input type="number" id="irrigation">

<label>🧪 Fertilizer Cost (₹)</label>
<input type="number" id="fertilizer">

<label>👷 Labour Cost (₹)</label>
<input type="number" id="labour">

<button onclick="calculate()">Calculate</button>

<div id="result" class="result"></div>

<button onclick="goHome()">⬅ Back to Home</button>

</div>

<script>

function calculate() {

    const data = {
        crop: document.getElementById("crop").value,
        area: Number(document.getElementById("area").value),
        seed: Number(document.getElementById("seed").value),
        irrigation: Number(document.getElementById("irrigation").value),
        fertilizer: Number(document.getElementById("fertilizer").value),
        labour: Number(document.getElementById("labour").value)
    };

    const resultBox = document.getElementById("result");
    resultBox.innerHTML = "⏳ Calculating...";

    fetch("http://127.0.0.1:8000/cost-predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(d => {

        if (d.error) {
            resultBox.innerHTML = "❌ " + d.error;
            return;
        }

        let profitText = "";
        let status = "";

        if (d.profit > 0) {
            profitText = `🟢 Profit: ₹${d.profit}`;
            status = "Good choice for farming";
        } else if (d.profit === 0) {
            profitText = `🟡 No Profit No Loss`;
            status = "Break-even";
        } else {
            profitText = `🔴 Loss: ₹${Math.abs(d.profit)}`;
            status = "Risky crop";
        }

        resultBox.innerHTML = `
        <h3>📊 Financial Summary</h3>

        <p>🌾 Crop: ${d.crop}</p>
        <p>📐 Area: ${d.area} acres</p>

        <p>💰 Total Cost: ₹${d.cost}</p>
        <p>💵 Income: ₹${d.income}</p>

        <p style="font-weight:bold;font-size:18px;">
        ${profitText}
        </p>

        <p>${status}</p>
        `;

    })
    .catch(() => {
        resultBox.innerHTML = "❌ Backend not running";
    });
}

function goHome(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
